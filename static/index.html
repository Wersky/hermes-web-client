<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wermes Client</title>
<style>
:root {
  --bg-root:#0d0e12;--bg-sidebar:#111318;--bg-main:#16171d;--bg-card:#1a1b23;--bg-hover:#1e1f2a;
  --bg-input:#1a1b23;--bg-code:#0f1016;--border:#252630;--border-focus:#5b5cff;
  --accent:#5b5cff;--accent-dim:#4546cc;--text-primary:#e4e4ec;--text-secondary:#8b8c9a;
  --text-muted:#5c5d6e;--success:#34d399;--warn:#fbbf24;--danger:#f87171;--info:#38bdf8;
  --radius:8px;--radius-sm:5px;--transition:150ms ease;
  --font-sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --font-mono:'JetBrains Mono','Fira Code','Consolas',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-sans);background:var(--bg-root);color:var(--text-primary);height:100vh;overflow:hidden;display:flex;font-size:13px;line-height:1.5}
#sidebar-left{width:260px;min-width:260px;background:var(--bg-sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column}
#main{flex:1;display:flex;flex-direction:column;min-width:0}
#sidebar-right{width:300px;min-width:300px;background:var(--bg-sidebar);border-left:1px solid var(--border);display:flex;flex-direction:column}
.sidebar-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-weight:600;font-size:13px;letter-spacing:.3px;color:var(--text-secondary)}
.sidebar-header .left{display:flex;align-items:center;gap:8px}
.sidebar-header .dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}
#settings-btn{cursor:pointer;font-size:15px;color:var(--text-muted);padding:4px;border-radius:var(--radius-sm);transition:all var(--transition)}
#settings-btn:hover{color:var(--text-primary);background:var(--bg-hover)}
#session-list{flex:1;overflow-y:auto;padding:6px}
.session-item{padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;margin-bottom:2px;transition:background var(--transition);border:1px solid transparent;user-select:none}
.session-item:hover{background:var(--bg-hover)}
.session-item.active{background:var(--bg-card);border-color:var(--border)}
.session-item.running{border-color:var(--warn)}
.session-item .title{font-size:12.5px;font-weight:500;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.session-item .meta{font-size:11px;color:var(--text-muted);margin-top:2px}
#new-chat-btn{margin:8px 10px;padding:8px 14px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);cursor:pointer;font-size:12.5px;font-weight:500;letter-spacing:.2px;transition:background var(--transition)}
#new-chat-btn:hover{background:var(--accent-dim)}
#ctx-menu{position:fixed;display:none;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:4px;z-index:9999;min-width:140px;box-shadow:0 4px 16px rgba(0,0,0,.4)}
.ctx-item{padding:8px 12px;border-radius:var(--radius-sm);cursor:pointer;font-size:12.5px;transition:background var(--transition)}.ctx-item:hover{background:var(--bg-hover)}.ctx-item.danger{color:var(--danger)}.ctx-divider{height:1px;background:var(--border);margin:4px 0}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:9998}.modal-overlay.show{display:flex}
.modal{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;max-width:480px;width:90%;max-height:80vh;overflow-y:auto}
.modal h3{font-size:16px;margin-bottom:14px;color:var(--text-primary)}.modal table{width:100%;border-collapse:collapse}
.modal td{padding:6px 8px;font-size:12px;border-bottom:1px solid var(--border)}.modal td:first-child{color:var(--text-muted);width:120px;font-weight:500}.modal td:last-child{color:var(--text-primary);font-family:var(--font-mono);font-size:11px;word-break:break-all}
.modal .btn-row{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.modal button{padding:8px 16px;border:none;border-radius:var(--radius-sm);cursor:pointer;font-size:12.5px;font-weight:500;transition:background var(--transition)}
.modal .btn-primary{background:var(--accent);color:#fff}.modal .btn-primary:hover{background:var(--accent-dim)}
.modal .btn-danger{background:var(--danger);color:#fff}.modal .btn-danger:hover{background:#e05555}
.modal .btn-warn{background:var(--warn);color:#0d0e12}.modal .btn-warn:hover{background:#e5a800}
.modal .btn-cancel{background:var(--bg-hover);color:var(--text-secondary)}.modal .btn-cancel:hover{color:var(--text-primary)}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.setting-row .label{font-size:13px;color:var(--text-primary)}.setting-row .desc{font-size:11px;color:var(--text-muted)}
.toggle{width:40px;height:22px;background:var(--border);border-radius:11px;cursor:pointer;position:relative;transition:background var(--transition);flex-shrink:0}
.toggle.on{background:var(--accent)}.toggle::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;background:#fff;border-radius:50%;transition:transform var(--transition)}.toggle.on::after{transform:translateX(18px)}
.lang-select{padding:5px 8px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-size:12px;cursor:pointer;outline:none}
.lang-select:focus{border-color:var(--border-focus)}
#chat-header{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;min-height:48px}
#chat-title{font-weight:600;font-size:13px;color:var(--text-primary);letter-spacing:.2px}
#chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:10px}
.message{display:flex;gap:12px;max-width:90%}.message.user{align-self:flex-end;flex-direction:row-reverse}.message.assistant,.message.tool{align-self:flex-start}
.msg-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.msg-avatar.user{background:var(--accent);color:#fff}.msg-avatar.assistant{background:var(--bg-card);color:var(--accent);border:1px solid var(--border)}
.msg-avatar.tool{background:var(--bg-code);color:var(--warn);border:1px solid var(--warn);font-size:10px}
.msg-content{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.msg-content code{background:var(--bg-code);padding:2px 5px;border-radius:3px;font-family:var(--font-mono);font-size:12px}
.msg-content pre{background:var(--bg-code);padding:10px 14px;border-radius:var(--radius-sm);overflow-x:auto;margin:8px 0;font-family:var(--font-mono);font-size:12px}
.tool-line{display:flex;align-items:flex-start;gap:8px;padding:2px 0;font-size:12px;color:var(--text-muted);font-family:var(--font-mono)}
.tool-line .prefix{color:var(--text-muted);white-space:nowrap}
.tool-line .cmd{color:var(--info);cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tool-line .cmd:hover{text-decoration:underline}
.tool-line .time{color:var(--text-muted);font-size:10px;white-space:nowrap;margin-left:auto}
.tool-output{display:none;background:var(--bg-code);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;margin:2px 0 4px 22px;font-size:11px;color:var(--text-secondary);font-family:var(--font-mono);white-space:pre-wrap;max-height:200px;overflow-y:auto}
.tool-output.show{display:block}
#chat-input-area{padding:12px 20px;border-top:1px solid var(--border)}
#input-row{display:flex;gap:10px;align-items:center}
#msg-input{flex:1;padding:10px 14px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius);color:var(--text-primary);font-size:13px;font-family:var(--font-sans);resize:none;outline:none;transition:border var(--transition)}
#msg-input:focus{border-color:var(--border-focus)}
#send-btn{padding:9px 18px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);cursor:pointer;font-size:12.5px;font-weight:500;letter-spacing:.2px;white-space:nowrap;transition:background var(--transition)}
#send-btn:hover{background:var(--accent-dim)}#send-btn:disabled{opacity:.4;cursor:not-allowed}
#status-bar{padding:6px 20px;font-size:11px;color:var(--text-muted);border-top:1px solid var(--border);display:flex;gap:16px}
#status-bar .connected{color:var(--success)}#status-bar .running{color:var(--warn)}
#right-tabs{display:flex;border-bottom:1px solid var(--border)}.right-tab{flex:1;padding:10px;text-align:center;cursor:pointer;font-size:12px;font-weight:500;color:var(--text-secondary);border-bottom:2px solid transparent;transition:all var(--transition)}.right-tab:hover{color:var(--text-primary)}.right-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
#right-content{flex:1;overflow-y:auto;padding:10px}
.skill-item{padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer;margin-bottom:2px;font-size:12px;border:1px solid transparent;transition:all var(--transition)}.skill-item:hover{background:var(--bg-hover)}.skill-item .skill-name{font-weight:500;color:var(--text-primary)}.skill-item .skill-cat{font-size:10px;color:var(--text-muted)}
.skill-detail{background:var(--bg-code);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin:6px 0;font-family:var(--font-mono);font-size:11px;white-space:pre-wrap;max-height:500px;overflow-y:auto;color:var(--text-secondary)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-muted)}.empty-state .icon{font-size:40px;margin-bottom:12px}
</style>
</head>
<body>

<div id="sidebar-left">
  <div class="sidebar-header"><div class="left"><span class="dot"></span> Hermes Sessions</div><span id="settings-btn" title="设置" onclick="openSettings()">⚙</span></div>
  <button id="new-chat-btn" onclick="newChat()">+ <span data-i18n="newChat">新对话</span></button>
  <div id="session-list"><div class="empty-state"><div class="icon">💬</div><div data-i18n="loading">加载中...</div></div></div>
</div>

<div id="main">
  <div id="chat-header"><span id="chat-title">Wermes Client</span></div>
  <div id="chat-messages"><div class="empty-state"><div class="icon">⚡</div><div data-i18n="startChat">开始一段新对话</div></div></div>
  <div id="status-bar"><span id="conn-dot" class="connected">●</span> <span id="conn-text" data-i18n="connected">已连接</span><span id="session-id-display"></span></div>
  <div id="chat-input-area"><div id="input-row">
    <textarea id="msg-input" rows="2" data-i18n-placeholder="inputPlaceholder" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)" onkeydown="handleKey(event)"></textarea>
    <button id="send-btn" onclick="sendMessage()" data-i18n="send">发送</button>
  </div></div>
</div>

<div id="sidebar-right">
  <div id="right-tabs"><div class="right-tab active" onclick="switchRightTab('skills')" data-i18n="skills">技能库</div><div class="right-tab" onclick="switchRightTab('memory')" data-i18n="memory">记忆</div></div>
  <div id="right-content"></div>
</div>

<!-- 右键菜单 -->
<div id="ctx-menu"><div class="ctx-item" onclick="ctxDetails()">📋 <span data-i18n="details">详细信息</span></div><div class="ctx-divider"></div><div class="ctx-item danger" onclick="ctxDelete()">🗑 <span data-i18n="delete">删除</span></div></div>
<div class="modal-overlay" id="modal-info"><div class="modal"><h3>📋 <span data-i18n="sessionInfo">会话详细信息</span></h3><div id="modal-info-body"></div><div class="btn-row"><button class="btn-cancel" onclick="closeModals()" data-i18n="close">关闭</button></div></div></div>
<div class="modal-overlay" id="modal-delete"><div class="modal"><h3>🗑 <span data-i18n="confirmDelete">确认删除</span></h3><p style="font-size:13px;color:var(--text-secondary);margin-bottom:12px"><span data-i18n="deleteConfirmText">确定要永久删除会话</span> <strong id="modal-delete-title" style="color:var(--text-primary)"></strong> ？</p><div class="btn-row"><button class="btn-cancel" onclick="closeModals()" data-i18n="cancel">取消</button><button class="btn-danger" onclick="confirmDelete()" data-i18n="confirmDeleteBtn">确认删除</button></div></div></div>
<div class="modal-overlay" id="modal-settings"><div class="modal"><h3>⚙ <span data-i18n="settings">设置</span></h3>
<div class="setting-row"><div><div class="label" data-i18n="showProcess">显示模型交互过程</div><div class="desc" data-i18n="showProcessDesc">实时展示工具调用和思考步骤</div><div class="desc" style="color:var(--warn);margin-top:4px" data-i18n="showProcessHint">⚠ 实验性功能，存在诸多 bug</div></div><div class="toggle on" id="toggle-process" onclick="toggleSetting('showProcess')"></div></div>
<div class="setting-row"><div><div class="label" data-i18n="language">语言 / Language</div></div><select class="lang-select" id="lang-select" onchange="setLanguage(this.value)"><option value="zh">中文</option><option value="en">English</option></select></div>
<div style="margin-top:12px;padding:10px;background:var(--bg-code);border-radius:var(--radius-sm);font-size:11px;color:var(--text-secondary);font-family:var(--font-mono)">Wermes Client · Port 7861</div>
<div class="btn-row"><button class="btn-cancel" onclick="closeModals()" data-i18n="close">关闭</button></div></div></div>

<!-- 危险命令确认 -->
<div class="modal-overlay" id="modal-danger"><div class="modal"><h3>⚠️ <span data-i18n="dangerTitle">危险命令确认</span></h3><p style="font-size:12px;color:var(--text-secondary);margin-bottom:4px" id="modal-danger-desc"></p><pre style="background:var(--bg-code);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;font-family:var(--font-mono);font-size:11px;color:var(--danger);white-space:pre-wrap;max-height:150px;overflow-y:auto" id="modal-danger-cmd"></pre><p style="font-size:11px;color:var(--text-muted);margin-top:8px" data-i18n="dangerHint">此命令被 hermes 安全机制拦截。批准后将使用 --yolo 重跑。</p><div class="btn-row"><button class="btn-cancel" onclick="closeModals()" data-i18n="deny">拒绝</button><button class="btn-warn" onclick="approveDanger()">⚠ <span data-i18n="approve">批准执行</span></button></div></div></div>

<script>
// ── i18n ──
const I18N={
  zh:{
    newChat:'新对话',loading:'加载中...',startChat:'开始一段新对话',
    connected:'已连接',running:'运行中...',runningYolo:'运行中 (yolo)...',
    inputPlaceholder:'输入消息... (Enter 发送, Shift+Enter 换行)',
    send:'发送',skills:'技能库',memory:'记忆',
    details:'详细信息',delete:'删除',sessionInfo:'会话详细信息',
    confirmDelete:'确认删除',deleteConfirmText:'确定要永久删除会话',
    cancel:'取消',confirmDeleteBtn:'确认删除',close:'关闭',
    settings:'设置',showProcess:'显示模型交互过程',
    showProcessDesc:'实时展示工具调用和思考步骤',
    showProcessHint:'⚠ 实验性功能，存在诸多 bug',
    language:'语言 / Language',
    noSessions:'暂无历史会话',unnamed:'未命名',conversation:'会话',
    newConversation:'新对话',sendToStart:'发送消息开始对话',
    loadHistory:'加载历史消息...',loadFailed:'加载失败',
    thinking:'⏳ 思考中...',retrying:'⏳ 重新执行中 (已批准)...',
    error:'❌ 错误','deleteFailed':'删除失败',
    dangerTitle:'危险命令确认',
    dangerDetected:'hermes 检测到危险命令',
    dangerHint:'此命令被 hermes 安全机制拦截。批准后将使用 --yolo 重跑。',
    deny:'拒绝',approve:'批准执行',
    backToList:'← 返回列表',noContent:'无内容',noSkills:'暂无技能',
    toolCall:'工具调用',
    sessionId:'会话 ID',title2:'标题',model2:'模型',
    createdAt:'创建时间',msgCount:'消息数',toolCalls:'工具调用',
    tokens:'Token(入/出)',cost:'费用',
  },
  en:{
    newChat:'New Chat',loading:'Loading...',startChat:'Start a new conversation',
    connected:'Connected',running:'Running...',runningYolo:'Running (yolo)...',
    inputPlaceholder:'Type a message... (Enter to send, Shift+Enter for new line)',
    send:'Send',skills:'Skills',memory:'Memory',
    details:'Details',delete:'Delete',sessionInfo:'Session Details',
    confirmDelete:'Confirm Delete',deleteConfirmText:'Permanently delete session',
    cancel:'Cancel',confirmDeleteBtn:'Delete',close:'Close',
    settings:'Settings',showProcess:'Show agent process',
    showProcessDesc:'Display tool calls and thinking steps in real-time',
    showProcessHint:'⚠ Experimental feature, may contain bugs',
    language:'Language / 语言',
    noSessions:'No sessions yet',unnamed:'Untitled',conversation:'Conversation',
    newConversation:'New Chat',sendToStart:'Send a message to start',
    loadHistory:'Loading history...',loadFailed:'Failed to load',
    thinking:'⏳ Thinking...',retrying:'⏳ Retrying (approved)...',
    error:'❌ Error','deleteFailed':'Delete failed',
    dangerTitle:'Dangerous Command',
    dangerDetected:'Hermes detected a dangerous command',
    dangerHint:'This command was blocked by Hermes security. Approving will re-run with --yolo.',
    deny:'Deny',approve:'⚠ Approve',
    backToList:'← Back to list',noContent:'No content',noSkills:'No skills',
    toolCall:'Tool call',
    sessionId:'Session ID',title2:'Title',model2:'Model',
    createdAt:'Created',msgCount:'Messages',toolCalls:'Tool Calls',
    tokens:'Tokens (in/out)',cost:'Cost',
  }
};

function t(key){return (I18N[state.settings.lang]||I18N.zh)[key]||key}
function applyI18n(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k=el.getAttribute('data-i18n');
    if(el.tagName==='TEXTAREA'&&el.hasAttribute('data-i18n-placeholder')){
      el.placeholder=t(el.getAttribute('data-i18n-placeholder'));
    }else{
      el.textContent=t(k);
    }
  });
  // Update dynamic elements
  updateDynamicI18n();
}
function updateDynamicI18n(){
  const c=document.getElementById('conn-text');
  if(c&&c.getAttribute('data-i18n')){
    if(c.className.includes('running'))c.textContent=t('running');
    else c.textContent=t('connected');
  }
  document.getElementById('chat-title').textContent=state.currentSessionTitle||t('newConversation');
  const msgInput=document.getElementById('msg-input');
  msgInput.placeholder=t('inputPlaceholder');
  const sendBtn=document.getElementById('send-btn');
  if(!sendBtn.disabled)sendBtn.textContent=t('send');
}
function setLanguage(lang){
  state.settings.lang=lang;
  saveSettings();
  applyI18n();
  // Re-render dynamic content
  renderSessions();
  if(state.rightTab==='skills')renderSkills();else loadMemory();
  const c=document.getElementById('chat-messages');
  if(!c.querySelector('.message')&&!c.querySelector('.empty-state')){
    c.innerHTML=`<div class="empty-state"><div class="icon">⚡</div><div>${t('startChat')}</div></div>`;
  }
}
document.getElementById('lang-select').addEventListener('change',function(){
  setLanguage(this.value);
});

// ── State ──
let state={
  currentSessionId:null,currentSessionTitle:null,ctxSessionId:null,
  sessions:[],skills:[],rightTab:'skills',settings:{showProcess:true,lang:'zh'},
  streamAbort:null,
  dangerMsg:null,dangerSid:null,dangerBaseline:0,
};
try{const s=localStorage.getItem('hermes-settings');if(s)Object.assign(state.settings,JSON.parse(s))}catch(e){}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function saveSettings(){localStorage.setItem('hermes-settings',JSON.stringify(state.settings))}
async function init(){
  applyI18n();
  document.getElementById('lang-select').value=state.settings.lang||'zh';
  document.getElementById('toggle-process').classList.toggle('on',state.settings.showProcess);
  state.currentSessionTitle=t('newConversation');
  document.getElementById('chat-title').textContent=state.currentSessionTitle;
  await Promise.all([loadSessions(),loadSkills()]);
}
init();

// ── 会话列表 ──
async function loadSessions(){
  try{const r=await fetch('/api/sessions');const d=await r.json();state.sessions=d.sessions||[];renderSessions()}catch(e){}
}
function renderSessions(){
  const el=document.getElementById('session-list');
  if(!state.sessions.length){el.innerHTML=`<div class="empty-state"><div class="icon">📭</div><div>${t('noSessions')}</div></div>`;return}
  el.innerHTML=state.sessions.map(s=>{
    let cls='session-item';
    if(s.id===state.currentSessionId)cls+=' active';
    if(s.id===state.runningSessionId)cls+=' running';
    return`<div class="${cls}" onclick="openSession('${s.id}')" oncontextmenu="ctxShow(event,'${s.id}','${esc(s.title)}')"><div class="title">${esc(s.title||t('unnamed'))}</div><div class="meta">${esc(s.last_active||'')}</div></div>`;
  }).join('');
}

// ── 右键 ──
function ctxShow(e,sid,title){e.preventDefault();state.ctxSessionId=sid;const m=document.getElementById('ctx-menu');m.style.display='block';m.style.left=e.clientX+'px';m.style.top=e.clientY+'px'}
document.addEventListener('click',()=>document.getElementById('ctx-menu').style.display='none');
async function ctxDetails(){
  document.getElementById('ctx-menu').style.display='none';document.getElementById('modal-info').classList.add('show');
  const body=document.getElementById('modal-info-body');body.innerHTML='<div style="text-align:center;padding:20px;color:var(--text-muted)">⏳</div>';
  try{const r=await fetch('/api/sessions/'+state.ctxSessionId+'/info');const d=await r.json();const i=d.info||{};const ts=i.started_at?new Date(i.started_at*1000).toLocaleString(state.settings.lang==='zh'?'zh-CN':'en-US'):'?';const s=state.sessions.find(x=>x.id===state.ctxSessionId);
  body.innerHTML=`<table><tr><td>${t('sessionId')}</td><td>${esc(i.id||'?')}</td></tr><tr><td>${t('title2')}</td><td>${esc(s?s.title:(i.title||'—'))}</td></tr><tr><td>${t('model2')}</td><td>${esc(i.model||'?')}</td></tr><tr><td>${t('createdAt')}</td><td>${ts}</td></tr><tr><td>${t('msgCount')}</td><td>${i.message_count||0}</td></tr><tr><td>${t('toolCalls')}</td><td>${i.tool_call_count||0}</td></tr><tr><td>${t('tokens')}</td><td>${(i.input_tokens||0).toLocaleString()} / ${(i.output_tokens||0).toLocaleString()}</td></tr><tr><td>${t('cost')}</td><td>$${(i.estimated_cost_usd||0).toFixed(4)}</td></tr></table>`}catch(e){body.innerHTML=`<div style="text-align:center;padding:20px;color:var(--danger)">${t('loadFailed')}</div>`}
}
function ctxDelete(){document.getElementById('ctx-menu').style.display='none';const s=state.sessions.find(x=>x.id===state.ctxSessionId);document.getElementById('modal-delete-title').textContent=s?s.title:state.ctxSessionId;document.getElementById('modal-delete').classList.add('show')}
async function confirmDelete(){const sid=state.ctxSessionId;try{const r=await fetch('/api/sessions/'+sid,{method:'DELETE'});const d=await r.json();if(d.ok){state.sessions=state.sessions.filter(x=>x.id!==sid);if(state.currentSessionId===sid)newChat();renderSessions()}else alert(t('deleteFailed')+': '+d.message)}catch(e){alert(t('deleteFailed')+': '+e.message)}closeModals()}

// ── 设置 ──
function openSettings(){
  document.getElementById('lang-select').value=state.settings.lang||'zh';
  document.getElementById('modal-settings').classList.add('show');
}
function closeModals(){document.querySelectorAll('.modal-overlay').forEach(m=>m.classList.remove('show'))}
function toggleSetting(key){state.settings[key]=!state.settings[key];saveSettings();document.getElementById('toggle-process').classList.toggle('on',state.settings.showProcess)}

// ── 危险命令确认 ──
function handleDanger(d){
  state.dangerMsg=d.message;state.dangerSid=d.session_id;state.dangerBaseline=d.baseline_id||0;
  document.getElementById('modal-danger-desc').textContent=d.description||t('dangerDetected');
  document.getElementById('modal-danger-cmd').textContent=d.command;
  document.getElementById('modal-danger').classList.add('show');
  document.getElementById('send-btn').disabled=false;
  document.getElementById('conn-dot').className='connected';
  document.getElementById('conn-text').textContent=t('connected');
}
async function approveDanger(){
  closeModals();
  const msg=state.dangerMsg;const sid=state.dangerSid;const baseline=state.dangerBaseline;
  state.dangerMsg=null;state.dangerSid=null;state.dangerBaseline=0;
  if(!msg||!sid)return;
  state.runningSessionId=sid;
  document.getElementById('send-btn').disabled=true;
  document.getElementById('conn-dot').className='running';
  document.getElementById('conn-text').textContent=t('runningYolo');
  const thinkId=appendMessage('assistant',t('retrying'),null,true);
  const abort=new AbortController();state.streamAbort=abort;
  try{
    const resp=await fetch('/api/chat/retry',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:msg,session_id:sid,baseline_id:baseline}),signal:abort.signal});
    const reader=resp.body.getReader();const decoder=new TextDecoder();
    let responseText='';
    while(true){
      const{value,done}=await reader.read();if(done)break;
      for(const line of decoder.decode(value,{stream:true}).split('\n')){
        if(!line.startsWith('data: '))continue;
        try{
          const d=JSON.parse(line.slice(6));
          if(d.type==='tool'&&state.settings.showProcess){if(thinkId)removeMessage(thinkId);appendMessage('tool',d)}
          else if(d.type==='response'){if(thinkId)removeMessage(thinkId);responseText=d.content}
        }catch(e){}
      }
    }
    if(responseText)appendMessage('assistant',responseText);
  }catch(e){if(e.name!=='AbortError'){if(thinkId)removeMessage(thinkId);appendMessage('assistant',t('error')+': '+e.message)}}
  state.runningSessionId=null;state.streamAbort=null;
  document.getElementById('send-btn').disabled=false;
  document.getElementById('conn-dot').className='connected';
  document.getElementById('conn-text').textContent=t('connected');
  await loadSessions();renderSessions();
}

// ── 会话 ──
async function openSession(id){
  if(state.runningSessionId===id)return;
  if(state.streamAbort){state.streamAbort.abort();state.streamAbort=null}
  if(state.runningSessionId){state.runningSessionId=null;document.getElementById('send-btn').disabled=false;document.getElementById('conn-dot').className='connected';document.getElementById('conn-text').textContent=t('connected')}
  state.currentSessionId=id;
  const s=state.sessions.find(x=>x.id===id);state.currentSessionTitle=s?s.title:t('conversation');
  document.getElementById('chat-title').textContent=state.currentSessionTitle;
  document.getElementById('session-id-display').textContent='ID: '+id;renderSessions();
  const c=document.getElementById('chat-messages');c.innerHTML=`<div class="empty-state"><div class="icon">⏳</div><div>${t('loadHistory')}</div></div>`;
  try{
    const r=await fetch('/api/sessions/'+id);const d=await r.json();c.innerHTML='';
    if(d.messages&&d.messages.length)d.messages.forEach(m=>appendMessage(m.role,m.content,m.tool_name));
    else c.innerHTML=`<div class="empty-state"><div class="icon">📋</div><div>${t('sendToStart')}</div></div>`;
  }catch(e){c.innerHTML=`<div class="empty-state"><div class="icon">❌</div><div>${t('loadFailed')}</div></div>`}
}

// ── 流式聊天 ──
async function sendMessage(){
  const input=document.getElementById('msg-input');const msg=input.value.trim();
  if(!msg||state.runningSessionId)return;
  input.value='';state.runningSessionId=state.currentSessionId||'new';
  
  appendMessage('user',msg);
  document.getElementById('send-btn').disabled=true;
  document.getElementById('conn-dot').className='running';
  document.getElementById('conn-text').textContent=t('running');
  renderSessions();

  const thinkId=appendMessage('assistant',t('thinking'),null,true);
  
  const abort=new AbortController();state.streamAbort=abort;
  const reqBody={message:msg};
  if(state.currentSessionId)reqBody.session_id=state.currentSessionId;
  
  try{
    const resp=await fetch('/api/chat/stream',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(reqBody),signal:abort.signal});
    const reader=resp.body.getReader();const decoder=new TextDecoder();
    let responseText='';let finalSid=null;
    
    while(true){
      const{value,done}=await reader.read();if(done)break;
      const text=decoder.decode(value,{stream:true});
      for(const line of text.split('\n')){
        if(!line.startsWith('data: '))continue;
        try{
          const d=JSON.parse(line.slice(6));
          if(d.type==='session'){finalSid=d.id}else
          if(d.type==='tool'&&state.settings.showProcess){if(thinkId)removeMessage(thinkId);appendMessage('tool',d)}else
          if(d.type==='danger'){if(thinkId)removeMessage(thinkId);handleDanger(d)}else
          if(d.type==='response'){if(thinkId)removeMessage(thinkId);responseText=d.content;finalSid=d.session_id;state.currentSessionTitle=d.session_title||t('newConversation');document.getElementById('chat-title').textContent=state.currentSessionTitle;if(!state.currentSessionId)state.currentSessionId=finalSid;document.getElementById('session-id-display').textContent='ID: '+(state.currentSessionId||finalSid)}else
          if(d.type==='done'){}
        }catch(e){}
      }
    }
    if(responseText)appendMessage('assistant',responseText);
    state.runningSessionId=null;state.streamAbort=null;
    await loadSessions();renderSessions();
  }catch(e){
    if(e.name!=='AbortError'){
      if(thinkId)removeMessage(thinkId);
      appendMessage('assistant',t('error')+': '+e.message);
    }
    state.runningSessionId=null;state.streamAbort=null;
  }
  
  document.getElementById('send-btn').disabled=false;
  document.getElementById('conn-dot').className='connected';
  document.getElementById('conn-text').textContent=t('connected');
  input.focus();
}

let mc=0;
function appendMessage(role,content,toolName,isTemp){
  if(role==='tool'&&!state.settings.showProcess)return;
  const id='msg-'+(++mc);const c=document.getElementById('chat-messages');const e=c.querySelector('.empty-state');if(e)e.remove();
  if(role==='tool'){
    const div=document.createElement('div');div.id=id;div.className='message tool';
    const obj=typeof content==='object'?content:{content:content,command:toolName||t('toolCall'),timestamp:0};
    const cmd=obj.command||toolName||t('toolCall');
    const body=typeof obj.content==='string'?obj.content:(obj.content||'');
    const short=body.length>300?body.substring(0,300)+'...':body;
    const outId='tool-out-'+id;
    div.innerHTML=`<div style="max-width:90%">
      <div class="tool-line">
        <span class="prefix">┊</span>
        <span class="cmd" id="tool-label-${id}" onclick="document.getElementById('${outId}').classList.toggle('show')">${esc(cmd)}</span>
      </div>
      <div class="tool-output" id="${outId}">${esc(short)}</div>
    </div>`;
    c.appendChild(div);c.scrollTop=c.scrollHeight;
    if(obj.msg_id)div.setAttribute('data-msg-id',obj.msg_id);
    return id;
  }
  const div=document.createElement('div');div.id=id;div.className='message '+role;
  div.innerHTML=`<div class="msg-avatar ${role}">${role==='user'?'U':'H'}</div><div class="msg-content">${esc(typeof content==='string'?content:content.content||'')}</div>`;
  c.appendChild(div);c.scrollTop=c.scrollHeight;return id;
}
function removeMessage(id){const e=document.getElementById(id);if(e)e.remove()}
function newChat(){
  if(state.streamAbort){state.streamAbort.abort();state.streamAbort=null}
  state.currentSessionId=null;state.currentSessionTitle=t('newConversation');state.runningSessionId=null;
  document.getElementById('chat-title').textContent=state.currentSessionTitle;
  document.getElementById('session-id-display').textContent='';
  document.getElementById('chat-messages').innerHTML=`<div class="empty-state"><div class="icon">⚡</div><div>${t('startChat')}</div></div>`;
  renderSessions();
}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}}

// ── 右侧栏 ──
function switchRightTab(tab){state.rightTab=tab;document.querySelectorAll('.right-tab').forEach((t,i)=>t.classList.toggle('active',(tab==='skills'&&i===0)||(tab==='memory'&&i===1)));tab==='skills'?renderSkills():loadMemory()}
async function loadSkills(){try{const r=await fetch('/api/skills');const d=await r.json();state.skills=d.skills||[];if(state.rightTab==='skills')renderSkills()}catch(e){}}
function renderSkills(){const el=document.getElementById('right-content');if(!state.skills.length){el.innerHTML=`<div class="empty-state"><div>📦</div><div>${t('noSkills')}</div></div>`;return}el.innerHTML=state.skills.map(s=>`<div class="skill-item" onclick="viewSkill('${esc(s.name)}')"><div class="skill-name">${esc(s.name)}</div><div class="skill-cat">${esc(s.category||'uncategorized')} · ${esc(s.status)}</div></div>`).join('')}
async function viewSkill(name){const el=document.getElementById('right-content');el.innerHTML=`<div class="empty-state"><div>⏳</div><div>${t('loading')}</div></div>`;try{const r=await fetch('/api/skills/'+encodeURIComponent(name));const d=await r.json();el.innerHTML=`<div style="padding:6px;cursor:pointer;color:var(--accent)" onclick="renderSkills()">${t('backToList')}</div><div style="font-weight:600;font-size:13px;padding:6px;color:var(--text-primary)">${esc(name)}</div><div class="skill-detail">${esc(d.content||t('noContent'))}</div>`}catch(e){el.innerHTML=`<div class="empty-state"><div>❌</div><div>${t('loadFailed')}</div></div>`}}
async function loadMemory(){const el=document.getElementById('right-content');el.innerHTML=`<div class="empty-state"><div>⏳</div><div>${t('loading')}</div></div>`;try{const r=await fetch('/api/memory');const d=await r.json();el.innerHTML=`<div style="font-weight:600;font-size:12px;padding:6px;color:var(--text-secondary);margin-top:4px">🧠 ${t('memory')}</div><div class="skill-detail" style="max-height:300px">${esc(d.memory||t('noContent'))}</div>`}catch(e){el.innerHTML=`<div class="empty-state"><div>❌</div><div>${t('loadFailed')}</div></div>`}}
</script>
