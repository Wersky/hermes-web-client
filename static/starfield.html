<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ 星空 ✦</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050510;overflow:hidden;cursor:none;user-select:none}
canvas{display:block}
#msg{position:fixed;bottom:40px;width:100%;text-align:center;color:rgba(255,255,255,0.7);font-family:'Segoe UI',sans-serif;font-size:18px;letter-spacing:2px;pointer-events:none;animation:fade 3s ease-in-out infinite alternate}
@keyframes fade{from{opacity:0.4}to{opacity:1}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="msg">✦ 给你的星空 ✦</div>
<script>
const c=document.getElementById('c');
const ctx=c.getContext('2d');
let w,h,cx,cy;
function resize(){w=c.width=innerWidth;h=c.height=innerHeight;cx=w/2;cy=h/2}
resize();window.onresize=resize;

const stars=[];
const N=400;
const colors=['#ff6b6b','#ffa94d','#ffd43b','#69db7c','#38d9a9','#4dabf7','#748ffc','#da77f2','#f783ac','#fff'];

for(let i=0;i<N;i++){
  const a=Math.random()*Math.PI*2;
  const r=Math.random()*Math.min(w,h)*0.7;
  stars.push({
    x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)*0.6,
    vx:(Math.random()-0.5)*0.4,vy:(Math.random()-0.5)*0.4,
    size:Math.random()*2.5+0.5,
    color:colors[Math.floor(Math.random()*colors.length)],
    twinkle:Math.random()*Math.PI*2,
    speed:Math.random()*0.03+0.01,
  });
}

let frame=0;
function draw(){
  ctx.fillStyle='rgba(5,5,16,0.15)';
  ctx.fillRect(0,0,w,h);
  frame+=0.008;

  for(const s of stars){
    // 引力+旋转
    const dx=cx-s.x,dy=cy-s.y;
    const dist=Math.sqrt(dx*dx+dy*dy)+0.1;
    const f=0.003*s.speed*50;
    s.vx+=f*dx/dist;s.vy+=f*dy/dist;
    s.vx+=0.001*dy/dist;s.vy-=0.001*dx/dist;
    s.vx*=0.998;s.vy*=0.998;
    s.x+=s.vx;s.y+=s.vy;

    // 边界反弹重生
    if(s.x<0||s.x>w||s.y<0||s.y>h){
      const aa=Math.random()*Math.PI*2;
      const rr=Math.random()*Math.min(w,h)*0.5;
      s.x=cx+rr*Math.cos(aa);s.y=cy+rr*Math.sin(aa)*0.6;
      s.vx=(Math.random()-0.5)*0.3;s.vy=(Math.random()-0.5)*0.3;
    }

    const alpha=0.4+0.6*Math.abs(Math.sin(frame*s.speed*50+s.twinkle));
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
    ctx.fillStyle=s.color.replace(')','').replace('rgb','rgba')+','+alpha+')';
    // Fix hex colors to rgba
    const hex=s.color;
    const rr=parseInt(hex.slice(1,3),16);
    const gg=parseInt(hex.slice(3,5),16);
    const bb=parseInt(hex.slice(5,7),16);
    ctx.fillStyle=`rgba(${rr},${gg},${bb},${alpha})`;
    ctx.fill();

    // 光晕
    if(s.size>1.5 && alpha>0.7){
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.size*2.5,0,Math.PI*2);
      ctx.fillStyle=`rgba(${rr},${gg},${bb},${alpha*0.12})`;
      ctx.fill();
    }
  }

  // 中心 ✧
  const pulse=1+0.3*Math.sin(frame*3);
  ctx.save();
  ctx.translate(cx,cy);
  ctx.rotate(frame*0.2);
  ctx.shadowColor='#fff';
  ctx.shadowBlur=20*pulse;
  ctx.fillStyle='#fff';
  ctx.font=`${28*pulse}px sans-serif`;
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('✧',0,0);
  ctx.restore();

  // 内环粒子
  for(let i=0;i<8;i++){
    const a=frame*0.5+i*Math.PI/4;
    const r=12+4*Math.sin(frame*2+i);
    const px=cx+r*Math.cos(a);
    const py=cy+r*Math.sin(a);
    ctx.beginPath();
    ctx.arc(px,py,1.2,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.7)';
    ctx.fill();
  }

  requestAnimationFrame(draw);
}
draw();

// 点击切换消息
let msgIdx=0;
const msgs=['✦ 给你的星空 ✦','⋆ 每颗星星都是一个想法 ⋆','✧ 短暂假期 ✧','· 继续加油 ·'];
document.onclick=()=>{
  msgIdx=(msgIdx+1)%msgs.length;
  document.getElementById('msg').textContent=msgs[msgIdx];
};
</script>
</body>
</html>
